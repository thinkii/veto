<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valorant — Map Ban/Pick</title>
<link rel="icon" type="image/png" href="https://www.valorant-esports.com/favicon.ico">
<link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230A0A0F'/><polygon points='50,10 90,85 70,85 50,45 30,85 10,85' fill='%23FF4655'/><polygon points='50,10 90,85 75,85 50,50' fill='%23FF4655' opacity='0.7'/></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0A0A0F;
    --surface:   #13131A;
    --card:      #1A1A24;
    --border:    #2A2A38;
    --ban:       #FF4655;
    --ban-dim:   rgba(255,70,85,0.15);
    --ban-glow:  rgba(255,70,85,0.35);
    --pick:      #00C2C7;
    --pick-dim:  rgba(0,194,199,0.15);
    --pick-glow: rgba(0,194,199,0.35);
    --atk:       #FF9A3C;
    --atk-dim:   rgba(255,154,60,0.15);
    --atk-glow:  rgba(255,154,60,0.35);
    --def:       #7EC8E3;
    --def-dim:   rgba(126,200,227,0.15);
    --def-glow:  rgba(126,200,227,0.35);
    --text:      #E8E8F0;
    --muted:     #6A6A8A;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding: 18px 36px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,70,85,0.06) 0%, transparent 100%);
  }

  .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .logo span { color: var(--ban); }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ===== SHARED BUTTON BASE ===== */
  .ctrl-btn {
    padding: 7px 18px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(7px 0%, 100% 0%, calc(100% - 7px) 100%, 0% 100%);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .ctrl-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
  .ctrl-btn.active {
    border-color: var(--ban);
    color: var(--ban);
    background: var(--ban-dim);
    box-shadow: 0 0 10px var(--ban-glow);
  }
  .ctrl-btn.lang-active {
    border-color: var(--pick);
    color: var(--pick);
    background: var(--pick-dim);
    box-shadow: 0 0 10px var(--pick-glow);
  }

  .divider { width: 1px; height: 24px; background: var(--border); }

  /* ===== MAIN ===== */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 36px 60px;
  }

  /* ===== SEQUENCE ===== */
  .sequence-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .sequence {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .seq-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }

  .seq-dot {
    width: 42px; height: 42px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    transition: all 0.3s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .seq-dot.type-ban  { border-color: rgba(255,70,85,0.3);  color: rgba(255,70,85,0.5); }
  .seq-dot.type-pick { border-color: rgba(0,194,199,0.3);  color: rgba(0,194,199,0.5); }
  .seq-dot.is-active.type-ban  { border-color:var(--ban); color:var(--ban); background:var(--ban-dim); box-shadow:0 0 14px var(--ban-glow); animation:pulse-ban 1.4s ease-in-out infinite; }
  .seq-dot.is-active.type-pick { border-color:var(--pick);color:var(--pick);background:var(--pick-dim);box-shadow:0 0 14px var(--pick-glow);animation:pulse-pick 1.4s ease-in-out infinite; }
  .seq-dot.done.type-ban  { border-color:var(--ban); background:var(--ban-dim); color:var(--ban); }
  .seq-dot.done.type-pick { border-color:var(--pick);background:var(--pick-dim);color:var(--pick); }

  .seq-map-name {
    font-size: 9px; font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px; color: var(--muted);
    text-transform: uppercase; max-width: 44px;
    text-align: center; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; height: 13px;
    transition: color 0.3s;
  }
  .seq-dot.done.type-ban  + .seq-map-name { color: var(--ban); }
  .seq-dot.done.type-pick + .seq-map-name { color: var(--pick); }

  @keyframes pulse-ban  { 0%,100%{box-shadow:0 0 10px var(--ban-glow);}50%{box-shadow:0 0 22px var(--ban-glow),0 0 40px rgba(255,70,85,0.2);} }
  @keyframes pulse-pick { 0%,100%{box-shadow:0 0 10px var(--pick-glow);}50%{box-shadow:0 0 22px var(--pick-glow),0 0 40px rgba(0,194,199,0.2);} }

  /* ===== STATUS BAR ===== */
  .status-bar {
    margin-bottom: 28px;
    padding: 13px 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; gap: 14px;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-ban  .status-dot { background:var(--ban);  box-shadow:0 0 8px var(--ban); }
  .status-pick .status-dot { background:var(--pick); box-shadow:0 0 8px var(--pick); }
  .status-side .status-dot { background:var(--atk);  box-shadow:0 0 8px var(--atk); }
  .status-done .status-dot { background:var(--muted); }
  .status-text { font-size:15px; font-weight:600; letter-spacing:2px; text-transform:uppercase; }
  .status-ban  .status-text { color:var(--ban); }
  .status-pick .status-text { color:var(--pick); }
  .status-side .status-text { color:var(--atk); }
  .status-done .status-text { color:var(--muted); }
  .status-sub  { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:1px; }

  /* ===== MAP GRID ===== */
  .maps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
    gap: 12px;
  }

  .map-card {
    position: relative;
    aspect-ratio: 16/10;
    background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.25s, box-shadow 0.25s;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  }
  .map-card:not(.banned):not(.picked):hover { transform: translateY(-3px); }
  .map-card.next-ban:not(.banned):not(.picked):hover { border-color:var(--ban); box-shadow:0 0 16px var(--ban-glow); }
  .map-card.next-pick:not(.banned):not(.picked):hover { border-color:var(--pick); box-shadow:0 0 16px var(--pick-glow); }

  /* Actual map photos from Valorant media */
  .map-bg {
    position: absolute; inset: 0;
    overflow: hidden;
    transition: opacity 0.3s, filter 0.3s;
    filter: brightness(0.55) saturate(0.8);
  }
  .map-bg img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    display: block;
  }
  .map-card:not(.banned):not(.picked):hover .map-bg { filter: brightness(0.75) saturate(1); }
  .map-card.banned .map-bg  { filter: brightness(0.25) saturate(0) sepia(0.5); opacity: 0.7; }
  .map-card.picked .map-bg  { filter: brightness(0.65) saturate(1.2); }

  .map-card[data-map="Ascent"]  .map-bg { background-image: url('https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/3ca35e44f6bdb99f69a40a87a8e57b9a73b4e00c-1920x1080.jpg'); }
  .map-card[data-map="Breeze"]  .map-bg { background-image: url('https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/04bb3b8a0fe9c02b97ce7c8f5bea05a71cd56c2b-1920x1080.jpg'); }
  .map-card[data-map="Haven"]   .map-bg { background-image: url('https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/ecc9a6a08c27ceab434c4b8d18fc8b62d2117e9e-1920x1080.jpg'); }
  .map-card[data-map="Lotus"]   .map-bg { background-image: url('https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/8d5fe29d0bb88a97e7da56c38c15f50a75048047-1920x1080.jpg'); }
  .map-card[data-map="Split"]   .map-bg { background-image: url('https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/3e2e7e7d19476b28ec3ba4498c30eb6fa71ebad3-1920x1080.jpg'); }
  .map-card[data-map="Summit"]  .map-bg { background-image: url('https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/2028d20bb56b9c7b0eed9b3f2eb4ff1ffae5b548-1920x1080.jpg'); }
  .map-card[data-map="Sunset"]  .map-bg { background-image: url('https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/8f0c020cbc17b5a8c40843fcbf3df58a9f26fe80-1920x1080.jpg'); }

  /* Fallback gradients if images don't load */
  .map-card[data-map="Ascent"]  .map-bg { background-color: #1a2a3a; }
  .map-card[data-map="Breeze"]  .map-bg { background-color: #1a2e1a; }
  .map-card[data-map="Haven"]   .map-bg { background-color: #2a1a2e; }
  .map-card[data-map="Lotus"]   .map-bg { background-color: #2e1a14; }
  .map-card[data-map="Split"]   .map-bg { background-color: #1a1a2e; }
  .map-card[data-map="Summit"]  .map-bg { background-color: #1a2a2a; }
  .map-card[data-map="Sunset"]  .map-bg { background-color: #2e1a0e; }

  /* Gradient overlay bottom */
  .map-card::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
    z-index: 1;
    pointer-events: none;
  }

  .map-name {
    position: absolute;
    bottom: 9px; left: 11px;
    font-size: 15px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    z-index: 2;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    transition: color 0.3s;
  }
  .map-card.banned .map-name { color: rgba(255,70,85,0.7); }
  .map-card.picked .map-name { color: var(--pick); }

  /* Corner crosshairs */
  .map-corner-tl, .map-corner-br {
    position: absolute;
    width: 10px; height: 10px;
    z-index: 3;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .map-corner-tl { top: 5px; left: 5px; border-top: 1px solid currentColor; border-left: 1px solid currentColor; }
  .map-corner-br { bottom: 5px; right: 5px; border-bottom: 1px solid currentColor; border-right: 1px solid currentColor; }
  .map-card.next-ban .map-corner-tl,
  .map-card.next-ban .map-corner-br { color: var(--ban); opacity: 1; }
  .map-card.next-pick .map-corner-tl,
  .map-card.next-pick .map-corner-br { color: var(--pick); opacity: 1; }

  /* Ban X */
  .ban-x {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.6) rotate(-20deg);
    transition: all 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    z-index: 4;
  }
  .map-card.banned .ban-x { opacity: 1; transform: scale(1) rotate(0deg); }
  .ban-x svg { width: 42px; height: 42px; }

  /* Pick check */
  .pick-check {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.6);
    transition: all 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    z-index: 4;
  }
  .map-card.picked .pick-check { opacity: 1; transform: scale(1); }
  .pick-check svg { width: 38px; height: 38px; }

  /* ===== SIDE PICKER OVERLAY ===== */
  .side-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .side-overlay.visible { display: flex; }

  .side-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px 48px;
    text-align: center;
    max-width: 420px; width: 90%;
    clip-path: polygon(16px 0%, 100% 0%, calc(100% - 16px) 100%, 0% 100%);
    animation: modal-in 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes modal-in { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .side-modal-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 6px;
  }
  .side-modal-map {
    font-size: 28px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--pick); margin-bottom: 28px;
  }
  .side-modal-question {
    font-size: 16px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text); margin-bottom: 20px;
  }
  .side-btns { display: flex; gap: 12px; justify-content: center; }

  .side-btn {
    flex: 1; padding: 14px 10px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .side-btn.atk { color: var(--atk); border-color: rgba(255,154,60,0.4); }
  .side-btn.def { color: var(--def); border-color: rgba(126,200,227,0.4); }
  .side-btn.atk:hover { background: var(--atk-dim); border-color: var(--atk); box-shadow: 0 0 14px var(--atk-glow); }
  .side-btn.def:hover { background: var(--def-dim); border-color: var(--def); box-shadow: 0 0 14px var(--def-glow); }

  /* ===== RESULTS PANEL ===== */
  .results-panel {
    margin-top: 32px;
    padding: 22px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: none;
  }
  .results-panel.visible { display: block; }
  .results-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 14px;
  }
  .results-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .result-chip {
    padding: 6px 14px;
    font-size: 13px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    border: 1px solid;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .result-chip.ban  { color:var(--ban);  border-color:rgba(255,70,85,0.4); background:var(--ban-dim); }
  .result-chip.pick { color:var(--pick); border-color:rgba(0,194,199,0.4);  background:var(--pick-dim); }
  .result-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase; opacity: 0.7;
    display: block; margin-top: 2px;
  }

  /* Bo3 picks with side */
  .pick-result-card {
    padding: 10px 18px;
    border: 1px solid rgba(0,194,199,0.4);
    background: var(--pick-dim);
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .pick-result-card .pr-map {
    font-size: 16px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--pick);
  }
  .pick-result-card .pr-side {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; margin-top: 3px;
  }
  .pr-side.atk { color: var(--atk); }
  .pr-side.def { color: var(--def); }

  .final-map-badge {
    display: inline-flex;
    align-items: center; gap: 12px;
    padding: 12px 22px;
    border: 1px solid var(--pick);
    background: var(--pick-dim);
    box-shadow: 0 0 20px var(--pick-glow);
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    margin-top: 14px;
  }
  .badge-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--pick); text-transform:uppercase; }
  .badge-name  { font-size:24px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--pick); }
  .badge-side  { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase; }
  .badge-side.atk { color: var(--atk); }
  .badge-side.def { color: var(--def); }

  .flag-btn { display: flex; align-items: center; gap: 5px; }
  .flag-icon { font-size: 14px; line-height: 1; }
  .flag-code { font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 2px; }

  /* ===== TEAM SELECT OVERLAY ===== */
  .team-overlay {
    display: flex;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 2000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }
  .team-overlay.hidden { display: none; }

  .team-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 48px 52px;
    text-align: center;
    max-width: 480px; width: 90%;
    clip-path: polygon(16px 0%, 100% 0%, calc(100% - 16px) 100%, 0% 100%);
    animation: modal-in 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  .team-modal-logo {
    font-size: 13px; font-family: 'Share Tech Mono', monospace;
    letter-spacing: 4px; color: var(--ban);
    text-transform: uppercase; margin-bottom: 6px;
  }
  .team-modal-title {
    font-size: 22px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--text); margin-bottom: 8px;
  }
  .team-modal-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--muted);
    letter-spacing: 2px; margin-bottom: 32px;
    line-height: 1.6;
  }
  .team-modal-sub span { color: var(--ban); }
  .team-btns { display: flex; gap: 14px; justify-content: center; }
  .team-btn {
    flex: 1; padding: 16px 12px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    color: var(--text);
  }
  .team-btn:hover { border-color: var(--ban); color: var(--ban); background: var(--ban-dim); box-shadow: 0 0 16px var(--ban-glow); }
  .team-btn.team-b { color: var(--pick); border-color: rgba(0,194,199,0.3); }
  .team-btn.team-b:hover { border-color: var(--pick); background: var(--pick-dim); box-shadow: 0 0 16px var(--pick-glow); color: var(--pick); }
  .team-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 2px;
    color: var(--muted); margin-top: 4px;
    display: block;
  }

  .team-inputs { display: flex; gap: 16px; }
  .team-input-group { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .team-input-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase;
    text-align: left;
  }
  .team-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    width: 100%;
  }
  .team-input::placeholder { color: var(--muted); font-weight: 500; letter-spacing: 1px; }
  .team-input:focus { border-color: var(--ban); box-shadow: 0 0 10px var(--ban-glow); }
  .team-input.team-input-b:focus { border-color: var(--pick); box-shadow: 0 0 10px var(--pick-glow); }
  .team-input-role {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase;
    text-align: left;
  }

  /* ===== RESULT TEAM ATTRIBUTION ===== */
  .pr-team {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; margin-top: 3px;
    color: var(--muted);
  }
  .pr-team-pick { color: rgba(0,194,199,0.7); }
  .pr-team-side { color: rgba(255,154,60,0.7); }
  .result-chip .result-team {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase; opacity: 0.6;
    display: block; margin-top: 1px;
  }

  .map-card.seq-locked { opacity: 0.45; }
  .map-card.seq-locked:hover { transform: none !important; }
  .map-card.seq-locked .map-corner-tl,
  .map-card.seq-locked .map-corner-br { opacity: 0 !important; }

  @keyframes flash-ban  { 0%{background:rgba(255,70,85,0.4);}100%{background:transparent;} }
  @keyframes flash-pick { 0%{background:rgba(0,194,199,0.4);}100%{background:transparent;} }
  .flash-ban  { animation: flash-ban  0.5s ease-out; }
  .flash-pick { animation: flash-pick 0.5s ease-out; }

  @media (max-width: 600px) {
    header { padding: 14px 18px; }
    main { padding: 22px 16px 40px; }
    .maps-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 9px; }
    .side-modal { padding: 30px 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">VALO<span>RANT</span> — MAP DRAFT</div>
  <div class="header-controls">
    <button class="ctrl-btn flag-btn" id="lang-es" onclick="setLang('es')"><span class="flag-icon">🇪🇸</span><span class="flag-code">ES</span></button>
    <button class="ctrl-btn flag-btn lang-active" id="lang-en" onclick="setLang('en')"><span class="flag-icon">🇬🇧</span><span class="flag-code">EN</span></button>
    <div class="divider"></div>
    <button class="ctrl-btn" id="btn-bo1" onclick="setPreset('bo1')">BO1</button>
    <button class="ctrl-btn active" id="btn-bo3" onclick="setPreset('bo3')">BO3</button>
    <div class="divider"></div>
    <button class="ctrl-btn" onclick="reset()" id="resetBtn">↺ RESET</button>
  </div>
</header>

<!-- Team select modal -->
<div class="team-overlay" id="teamOverlay">
  <div class="team-modal">
    <div class="team-modal-logo">// VALORANT MAP DRAFT</div>
    <div class="team-modal-title" id="teamModalTitle">Introduce los equipos</div>
    <div class="team-modal-sub" id="teamModalSub">
      <span id="teamModalSubText">El Equipo B inicia el proceso de veto</span>
    </div>
    <div class="team-inputs">
      <div class="team-input-group">
        <label class="team-input-label" id="labelTeamA">EQUIPO A</label>
        <input class="team-input" id="inputTeamA" type="text" maxlength="20" placeholder="Equipo A" autocomplete="off">
        <div class="team-input-role" id="roleTeamA">BANEA SEGUNDO</div>
      </div>
      <div class="team-input-group">
        <label class="team-input-label" id="labelTeamB">EQUIPO B</label>
        <input class="team-input team-input-b" id="inputTeamB" type="text" maxlength="20" placeholder="Equipo B" autocomplete="off">
        <div class="team-input-role" id="roleTeamB">INICIA EL VETO</div>
      </div>
    </div>
    <div class="team-btns" style="margin-top:28px;">
      <button class="team-btn" id="btnSelectA" onclick="selectTeam('A')">
        <span id="btnSelectAText">SOY EQUIPO A</span>
      </button>
      <button class="team-btn team-b" id="btnSelectB" onclick="selectTeam('B')">
        <span id="btnSelectBText">SOY EQUIPO B</span>
      </button>
    </div>
  </div>
</div>

<!-- Side picker modal -->
<div class="side-overlay" id="sideOverlay">
  <div class="side-modal">
    <div class="side-modal-label" id="sideLabel">PICK 1</div>
    <div class="side-modal-map" id="sideMapName">ASCENT</div>
    <div class="side-modal-question" id="sideQuestion">Choose your side</div>
    <div class="side-btns">
      <button class="side-btn atk" id="atkBtn" onclick="chooseSide('atk')">⚔ ATTACK</button>
      <button class="side-btn def" id="defBtn" onclick="chooseSide('def')">🛡 DEFENSE</button>
    </div>
  </div>
</div>

<main>
  <div class="sequence-label" id="seqLabel">// DRAFT SEQUENCE</div>
  <div class="sequence" id="sequence"></div>

  <div class="status-bar" id="statusBar">
    <div class="status-dot"></div>
    <div class="status-text" id="statusText">SELECT A MAP</div>
    <div class="status-sub" id="statusSub"></div>
  </div>

  <div class="maps-grid" id="mapsGrid"></div>

  <div class="results-panel" id="resultsPanel">
    <div class="results-title" id="resultsTitle">// DRAFT RESULTS</div>
    <div class="results-row" id="resultsRow"></div>
  </div>
</main>

<script>
  /* ===== I18N ===== */
  const T = {
    en: {
      seqLabel: '// DRAFT SEQUENCE',
      resultsTitle: '// DRAFT RESULTS',
      selectMap: 'SELECT A MAP',
      banning: 'BANNING —',
      picking: 'PICKING —',
      draftDone: 'DRAFT COMPLETE',
      draftDoneSub: 'All maps have been processed',
      step: 'STEP',
      of: '/',
      selectSub: '· Select a map',
      finalMap: 'FINAL MAP',
      sideQuestion: 'Choose your starting side',
      attack: '⚔ ATTACK',
      defense: '🛡 DEFENSE',
      bo3picks: ['PICK 1','PICK 2','FINAL MAP'],
      pickLabel: 'PICK',
      banLabel: 'BAN',
      chooseSide: 'Choose a side',
    },
    es: {
      seqLabel: '// SECUENCIA DE DRAFT',
      resultsTitle: '// RESULTADO DEL DRAFT',
      selectMap: 'SELECCIONA UN MAPA',
      banning: 'BANEANDO —',
      picking: 'ELIGIENDO —',
      draftDone: 'DRAFT COMPLETADO',
      draftDoneSub: 'Todos los mapas han sido procesados',
      step: 'PASO',
      of: '/',
      selectSub: '· Selecciona un mapa',
      finalMap: 'MAPA FINAL',
      sideQuestion: 'Elige tu bando inicial',
      attack: '⚔ ATAQUE',
      defense: '🛡 DEFENSA',
      bo3picks: ['PICK 1','PICK 2','MAPA 3'],
      pickLabel: 'PICK',
      banLabel: 'BAN',
      chooseSide: 'Elige bando',
    }
  };

  let lang = 'en';
  let t = T[lang];

  function setLang(l) {
    lang = l;
    t = T[lang];
    document.getElementById('lang-es').classList.toggle('lang-active', l === 'es');
    document.getElementById('lang-en').classList.toggle('lang-active', l === 'en');
    document.getElementById('lang-es').classList.toggle('ctrl-btn', true);
    applyLangTexts();
    applyTeamSelectLang();
    renderSequence();
    renderMaps();
    updateStatus();
    if (currentStep >= sequence.length) showResults();
  }

  function applyLangTexts() {
    document.getElementById('seqLabel').textContent = t.seqLabel;
    document.getElementById('resultsTitle').textContent = t.resultsTitle;
    document.getElementById('sideQuestion').textContent = t.sideQuestion;
    document.getElementById('atkBtn').textContent = t.attack;
    document.getElementById('defBtn').textContent = t.defense;
  }

  /* ===== DATA ===== */
  const MAPS = ['Ascent','Breeze','Haven','Lotus','Split','Summit','Sunset'];

  const PRESETS = {
    // Bo1: B B B A A A → last map auto
    bo1: () => [
      {type:'ban', labelKey:'BAN 1', team:'B'},
      {type:'ban', labelKey:'BAN 2', team:'A'},
      {type:'ban', labelKey:'BAN 3', team:'B'},
      {type:'ban', labelKey:'BAN 4', team:'A'},
      {type:'ban', labelKey:'BAN 5', team:'B'},
      {type:'ban', labelKey:'BAN 6', team:'A'},
      {type:'pick',labelKey:'MAP',   team:'auto', pickIdx: 0},
    ],
    // Bo3: B ban, A ban, B pick, A pick, A ban, B ban, remaining auto
    bo3: () => [
      {type:'ban', labelKey:'BAN 1', team:'B'},
      {type:'ban', labelKey:'BAN 2', team:'A'},
      {type:'pick',labelKey:'PICK 1', pickIdx: 0, needsSide: true, team:'B'},
      {type:'pick',labelKey:'PICK 2', pickIdx: 1, needsSide: true, team:'A'},
      {type:'ban', labelKey:'BAN 3', team:'A'},
      {type:'ban', labelKey:'BAN 4', team:'B'},
      {type:'pick',labelKey:'MAP 3',  pickIdx: 2, needsSide: true, team:'auto'},
    ],
  };

  let currentPreset = 'bo3';
  let sequence = [];
  let currentStep = 0;
  let selections = []; // {map, type, side?, teamPick?, teamSide?}
  let pendingSide = null; // {map, stepIdx, pickIdx}
  let myTeam = null; // 'A' or 'B'
  let teamNames = { A: 'Equipo A', B: 'Equipo B' };

  /* ===== TEAM SELECTION ===== */
  function showTeamSelect() {
    const overlay = document.getElementById('teamOverlay');
    overlay.classList.remove('hidden');
    applyTeamSelectLang();
  }

  function applyTeamSelectLang() {
    const isEs = lang === 'es';
    document.getElementById('teamModalTitle').textContent = isEs ? 'Introduce los equipos' : 'Enter Team Names';
    document.getElementById('teamModalSubText').textContent = isEs
      ? 'El Equipo B inicia el proceso de veto'
      : 'Team B starts the veto process first';
    document.getElementById('labelTeamA').textContent = isEs ? 'EQUIPO A' : 'TEAM A';
    document.getElementById('labelTeamB').textContent = isEs ? 'EQUIPO B' : 'TEAM B';
    document.getElementById('roleTeamA').textContent = isEs ? 'BANEA SEGUNDO' : 'PICKS SECOND';
    document.getElementById('roleTeamB').textContent = isEs ? 'INICIA EL VETO' : 'STARTS VETO';
    document.getElementById('btnSelectAText').textContent = isEs ? 'SOY EQUIPO A' : 'I AM TEAM A';
    document.getElementById('btnSelectBText').textContent = isEs ? 'SOY EQUIPO B' : 'I AM TEAM B';
    document.getElementById('inputTeamA').placeholder = isEs ? 'Equipo A' : 'Team A';
    document.getElementById('inputTeamB').placeholder = isEs ? 'Equipo B' : 'Team B';
  }

  function selectTeam(team) {
    const nameA = document.getElementById('inputTeamA').value.trim();
    const nameB = document.getElementById('inputTeamB').value.trim();
    teamNames.A = nameA || (lang === 'es' ? 'Equipo A' : 'Team A');
    teamNames.B = nameB || (lang === 'es' ? 'Equipo B' : 'Team B');
    myTeam = team;
    document.getElementById('teamOverlay').classList.add('hidden');
  }

  /* ===== SEQUENTIAL BUTTON LOCK ===== */
  // Returns true if the map can be acted on (left-to-right order enforced)
  // Maps must be selected in sequence: map at index N can't be clicked if index N-1 hasn't been selected
  // (This is handled naturally by currentStep — only maps in the "available" pool are clickable, 
  //  and clicking advances currentStep. The header buttons BO1/BO3 are locked while a game is in progress.)

  function lockHeaderButtons(locked) {
    // Lock BO1/BO3 once veto starts to prevent mid-game changes
    const bo1 = document.getElementById('btn-bo1');
    const bo3 = document.getElementById('btn-bo3');
    if (locked) {
      bo1.style.pointerEvents = 'none';
      bo1.style.opacity = '0.4';
      bo3.style.pointerEvents = 'none';
      bo3.style.opacity = '0.4';
    } else {
      bo1.style.pointerEvents = '';
      bo1.style.opacity = '';
      bo3.style.pointerEvents = '';
      bo3.style.opacity = '';
    }
  }


  function setPreset(p) {
    currentPreset = p;
    document.getElementById('btn-bo1').classList.toggle('active', p === 'bo1');
    document.getElementById('btn-bo3').classList.toggle('active', p === 'bo3');
    reset();
  }

  function reset() {
    sequence = PRESETS[currentPreset]().map(s => ({...s, map: null, side: null}));
    currentStep = 0;
    selections = [];
    pendingSide = null;
    document.getElementById('sideOverlay').classList.remove('visible');
    document.getElementById('resultsPanel').classList.remove('visible');
    document.getElementById('resultsRow').innerHTML = '';
    // remove any extra badges
    document.querySelectorAll('.final-map-badge').forEach(e => e.remove());
    lockHeaderButtons(false);
    renderSequence();
    renderMaps();
    updateStatus();
    applyLangTexts();
    showTeamSelect();
  }

  /* ===== RENDER SEQUENCE ===== */
  function renderSequence() {
    const container = document.getElementById('sequence');
    container.innerHTML = '';
    sequence.forEach((step, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'seq-step';

      const dot = document.createElement('div');
      dot.className = `seq-dot type-${step.type}`;
      if (i === currentStep && currentStep < sequence.length) dot.classList.add('is-active');
      if (step.map) dot.classList.add('done');
      dot.textContent = step.type === 'ban' ? t.banLabel : t.pickLabel;

      const name = document.createElement('div');
      name.className = 'seq-map-name';
      name.textContent = step.map ? step.map.substring(0,6) : '';

      wrap.appendChild(dot);
      wrap.appendChild(name);
      container.appendChild(wrap);
    });
  }

  /* ===== RENDER MAPS ===== */
  function renderMaps() {
    const grid = document.getElementById('mapsGrid');
    grid.innerHTML = '';
    const isDone = currentStep >= sequence.length;
    const awaitSide = pendingSide !== null;
    const currentType = (!isDone && !awaitSide) ? sequence[currentStep].type : null;

      const MAP_IMGS = {
        Ascent:  'https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/3ca35e44f6bdb99f69a40a87a8e57b9a73b4e00c-1920x1080.jpg',
        Breeze:  'https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/04bb3b8a0fe9c02b97ce7c8f5bea05a71cd56c2b-1920x1080.jpg',
        Haven:   'https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/ecc9a6a08c27ceab434c4b8d18fc8b62d2117e9e-1920x1080.jpg',
        Lotus:   'https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/8d5fe29d0bb88a97e7da56c38c15f50a75048047-1920x1080.jpg',
        Split:   'https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/3e2e7e7d19476b28ec3ba4498c30eb6fa71ebad3-1920x1080.jpg',
        Summit:  'https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/2028d20bb56b9c7b0eed9b3f2eb4ff1ffae5b548-1920x1080.jpg',
        Sunset:  'https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/8f0c020cbc17b5a8c40843fcbf3df58a9f26fe80-1920x1080.jpg',
      };

    MAPS.forEach((map, mapIdx) => {
      const sel = selections.find(s => s.map === map);
      const card = document.createElement('div');
      card.className = 'map-card';
      card.dataset.map = map;
      card.dataset.mapIdx = mapIdx;

      if (sel) {
        card.classList.add(sel.type === 'ban' ? 'banned' : 'picked');
      } else if (!isDone && !awaitSide) {
        card.classList.add(`next-${currentType}`);
      }

      card.innerHTML = `
        <div class="map-bg"><img src="${MAP_IMGS[map] || ''}" alt="${map}" loading="lazy" onerror="this.style.display='none'"></div>
        <div class="map-corner-tl"></div>
        <div class="map-corner-br"></div>
        <div class="map-name">${map}</div>
        <div class="ban-x">
          <svg viewBox="0 0 44 44" fill="none"><line x1="8" y1="8" x2="36" y2="36" stroke="#FF4655" stroke-width="2.5" stroke-linecap="round"/><line x1="36" y1="8" x2="8" y2="36" stroke="#FF4655" stroke-width="2.5" stroke-linecap="round"/></svg>
        </div>
        <div class="pick-check">
          <svg viewBox="0 0 40 40" fill="none"><polyline points="8,20 17,29 32,12" stroke="#00C2C7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      `;

      if (!sel && !isDone && !awaitSide) {
        card.addEventListener('click', () => selectMap(map, card));
      }

      grid.appendChild(card);
    });
  }

  /* ===== SELECT MAP ===== */
  function selectMap(map, card) {
    if (currentStep >= sequence.length) return;
    if (pendingSide !== null) return;

    // Lock preset buttons once veto starts
    if (currentStep === 0) lockHeaderButtons(true);

    const step = sequence[currentStep];
    step.map = map;

    card.classList.add(step.type === 'ban' ? 'flash-ban' : 'flash-pick');
    setTimeout(() => card.classList.remove('flash-ban','flash-pick'), 500);

    if (step.type === 'pick' && step.needsSide && currentPreset === 'bo3') {
      // Show side picker before advancing
      pendingSide = { map, stepIdx: currentStep, pickIdx: step.pickIdx, team: step.team };
      showSidePicker(map, step);
    } else {
      selections.push({map, type: step.type, side: null, teamPick: step.team, teamSide: null});
      currentStep++;
      renderSequence();
      renderMaps();
      updateStatus();
      if (currentStep >= sequence.length) showResults();
    }
  }

  /* ===== SIDE PICKER ===== */
  function showSidePicker(map, step) {
    const pickNum = step.pickIdx + 1;
    document.getElementById('sideLabel').textContent = `${t.pickLabel} ${pickNum}`;
    document.getElementById('sideMapName').textContent = map.toUpperCase();
    // The team that picks the side is the opponent
    const sideTeam = step.team === 'A' ? 'B' : step.team === 'B' ? 'A' : null;
    const sideTeamName = sideTeam ? getTeamName(sideTeam) : '';
    document.getElementById('sideQuestion').textContent = sideTeamName
      ? `${sideTeamName} — ${t.sideQuestion}`
      : t.sideQuestion;
    document.getElementById('atkBtn').textContent = t.attack;
    document.getElementById('defBtn').textContent = t.defense;
    // store sideTeam for later
    if (pendingSide) pendingSide.sideTeam = sideTeam;
    document.getElementById('sideOverlay').classList.add('visible');
    renderMaps(); // re-render in waiting state
    updateStatus();
  }

  function chooseSide(side) {
    if (!pendingSide) return;
    const { map, stepIdx, team, sideTeam } = pendingSide;
    sequence[stepIdx].side = side;
    selections.push({map, type: 'pick', side, teamPick: team, teamSide: sideTeam || null});
    currentStep = stepIdx + 1;
    pendingSide = null;
    document.getElementById('sideOverlay').classList.remove('visible');
    renderSequence();
    renderMaps();
    updateStatus();
    if (currentStep >= sequence.length) showResults();
  }

  /* ===== STATUS BAR ===== */
  function getTeamName(teamKey) {
    if (teamKey === 'auto') return lang === 'es' ? 'AUTO' : 'AUTO';
    return teamNames[teamKey] || (teamKey === 'A' ? (lang==='es'?'Equipo A':'Team A') : (lang==='es'?'Equipo B':'Team B'));
  }

  function updateStatus() {
    const bar = document.getElementById('statusBar');
    const text = document.getElementById('statusText');
    const sub = document.getElementById('statusSub');
    bar.className = 'status-bar';

    if (pendingSide) {
      bar.classList.add('status-side');
      text.textContent = t.chooseSide.toUpperCase() + ' — ' + pendingSide.map.toUpperCase();
      sub.textContent = '';
      return;
    }
    if (currentStep >= sequence.length) {
      bar.classList.add('status-done');
      text.textContent = t.draftDone;
      sub.textContent = t.draftDoneSub;
      return;
    }
    const step = sequence[currentStep];
    const teamLabel = step.team !== 'auto' ? ` · ${getTeamName(step.team)}` : '';
    bar.classList.add(`status-${step.type}`);
    text.textContent = step.type === 'ban'
      ? `${t.banning} ${step.labelKey}`
      : `${t.picking} ${step.labelKey}`;
    sub.textContent = `${t.step} ${currentStep + 1} ${t.of} ${sequence.length} ${t.selectSub}${teamLabel}`;
  }

  /* ===== RESULTS ===== */
  function showResults() {
    const panel = document.getElementById('resultsPanel');
    const row = document.getElementById('resultsRow');
    panel.classList.add('visible');
    row.innerHTML = '';
    // remove old badges
    panel.querySelectorAll('.final-map-badge').forEach(e => e.remove());

    const bans  = selections.filter(s => s.type === 'ban');
    const picks = selections.filter(s => s.type === 'pick');

    bans.forEach((s, i) => {
      const chip = document.createElement('div');
      chip.className = 'result-chip ban';
      const teamLabel = s.teamPick && s.teamPick !== 'auto' ? getTeamName(s.teamPick) : '';
      chip.innerHTML = `${s.map}<span class="result-label">${t.banLabel} ${i+1}</span>${teamLabel ? `<span class="result-team">${teamLabel}</span>` : ''}`;
      row.appendChild(chip);
    });

    if (currentPreset === 'bo3') {
      picks.forEach((s, i) => {
        const isLast = i === picks.length - 1;
        const card = document.createElement('div');
        card.className = 'pick-result-card';
        const sideText = s.side === 'atk' ? t.attack.replace('⚔ ','') : s.side === 'def' ? t.defense.replace('🛡 ','') : '';
        const sideClass = s.side || '';
        const pickTeamLabel = s.teamPick && s.teamPick !== 'auto' ? getTeamName(s.teamPick) : (lang==='es'?'Auto':'Auto');
        const sideTeamLabel = s.teamSide ? getTeamName(s.teamSide) : '';
        card.innerHTML = `
          <div class="pr-map">${isLast ? '★ ' : ''}${s.map}</div>
          ${s.side ? `<div class="pr-side ${sideClass}">${sideText}${sideTeamLabel ? ` <span style="opacity:0.6;font-size:8px">· ${sideTeamLabel}</span>` : ''}</div>` : ''}
          <div class="pr-team pr-team-pick">${lang==='es'?'Elige':'Pick'}: ${pickTeamLabel}</div>
          <span class="result-label">${isLast ? t.finalMap : t.pickLabel + ' ' + (i+1)}</span>
        `;
        row.appendChild(card);
      });
    } else {
      if (picks.length > 0) {
        const badge = document.createElement('div');
        badge.className = 'final-map-badge';
        badge.innerHTML = `<span class="badge-label">${t.finalMap}</span><span class="badge-name">${picks[0].map}</span>`;
        panel.appendChild(badge);
      }
    }
  }

  /* ===== INIT ===== */
  setLang('es');
  setPreset('bo3');
  showTeamSelect();
</script>
</body>
</html>
