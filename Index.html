<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valorant — Map Ban/Pick</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0A0A0F;
    --surface:   #13131A;
    --card:      #1A1A24;
    --border:    #2A2A38;
    --ban:       #FF4655;
    --ban-dim:   rgba(255,70,85,0.15);
    --ban-glow:  rgba(255,70,85,0.35);
    --pick:      #00C2C7;
    --pick-dim:  rgba(0,194,199,0.15);
    --pick-glow: rgba(0,194,199,0.35);
    --text:      #E8E8F0;
    --muted:     #6A6A8A;
    --active:    #FFD700;
    --active-dim:rgba(255,215,0,0.15);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
  }

  /* — Scanline overlay — */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* === HEADER === */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,70,85,0.06) 0%, transparent 100%);
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text);
  }
  .logo span { color: var(--ban); }

  /* === PRESET SELECTOR === */
  .presets {
    display: flex;
    gap: 8px;
  }

  .preset-btn {
    padding: 8px 22px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    text-transform: uppercase;
  }
  .preset-btn:hover {
    border-color: var(--ban);
    color: var(--text);
    background: var(--ban-dim);
  }
  .preset-btn.active {
    border-color: var(--ban);
    color: var(--ban);
    background: var(--ban-dim);
    box-shadow: 0 0 12px var(--ban-glow);
  }

  /* === RESET === */
  .reset-btn {
    padding: 8px 18px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .reset-btn:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  /* === MAIN === */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 40px 60px;
  }

  /* === SEQUENCE BAR === */
  .sequence-wrapper {
    margin-bottom: 40px;
  }

  .sequence-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .sequence {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .seq-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .seq-dot {
    width: 44px;
    height: 44px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    transition: all 0.3s;
    position: relative;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .seq-dot.type-ban  { border-color: rgba(255,70,85,0.3);  color: rgba(255,70,85,0.5); }
  .seq-dot.type-pick { border-color: rgba(0,194,199,0.3);  color: rgba(0,194,199,0.5); }
  .seq-dot.is-active.type-ban  {
    border-color: var(--ban);
    color: var(--ban);
    background: var(--ban-dim);
    box-shadow: 0 0 14px var(--ban-glow);
    animation: pulse-ban 1.4s ease-in-out infinite;
  }
  .seq-dot.is-active.type-pick {
    border-color: var(--pick);
    color: var(--pick);
    background: var(--pick-dim);
    box-shadow: 0 0 14px var(--pick-glow);
    animation: pulse-pick 1.4s ease-in-out infinite;
  }
  .seq-dot.done.type-ban  { border-color: var(--ban);  background: var(--ban-dim);  color: var(--ban); }
  .seq-dot.done.type-pick { border-color: var(--pick); background: var(--pick-dim); color: var(--pick); }

  .seq-map-name {
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    max-width: 44px;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    height: 14px;
    transition: color 0.3s;
  }
  .seq-dot.done.type-ban  + .seq-map-name { color: var(--ban); }
  .seq-dot.done.type-pick + .seq-map-name { color: var(--pick); }

  @keyframes pulse-ban  { 0%,100% { box-shadow: 0 0 10px var(--ban-glow); } 50% { box-shadow: 0 0 22px var(--ban-glow), 0 0 40px rgba(255,70,85,0.2); } }
  @keyframes pulse-pick { 0%,100% { box-shadow: 0 0 10px var(--pick-glow); } 50% { box-shadow: 0 0 22px var(--pick-glow), 0 0 40px rgba(0,194,199,0.2); } }

  /* === STATUS BAR === */
  .status-bar {
    margin-bottom: 32px;
    padding: 14px 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 16px;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }

  .status-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-ban  .status-indicator { background: var(--ban);  box-shadow: 0 0 8px var(--ban); }
  .status-pick .status-indicator { background: var(--pick); box-shadow: 0 0 8px var(--pick); }
  .status-done .status-indicator { background: var(--muted); }

  .status-text {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .status-ban  .status-text { color: var(--ban); }
  .status-pick .status-text { color: var(--pick); }
  .status-done .status-text { color: var(--muted); }

  .status-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* === MAP GRID === */
  .maps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 14px;
  }

  .map-card {
    position: relative;
    aspect-ratio: 16/10;
    background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.25s, box-shadow 0.25s;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  }

  .map-card:not(.banned):not(.picked):not(.used):hover {
    transform: translateY(-3px);
    border-color: rgba(255,255,255,0.25);
  }
  .map-card:not(.banned):not(.picked):not(.used).next-ban:hover {
    border-color: var(--ban);
    box-shadow: 0 0 16px var(--ban-glow), inset 0 0 20px rgba(255,70,85,0.05);
  }
  .map-card:not(.banned):not(.picked):not(.used).next-pick:hover {
    border-color: var(--pick);
    box-shadow: 0 0 16px var(--pick-glow), inset 0 0 20px rgba(0,194,199,0.05);
  }

  /* Map background gradient (unique per map) */
  .map-card[data-map="Ascent"]  .map-bg { background: linear-gradient(135deg, #1a2a3a 0%, #0d1a2a 100%); }
  .map-card[data-map="Breeze"]  .map-bg { background: linear-gradient(135deg, #1a2a1a 0%, #0d2a1a 100%); }
  .map-card[data-map="Haven"]   .map-bg { background: linear-gradient(135deg, #2a1a2a 0%, #1a0d2a 100%); }
  .map-card[data-map="Lotus"]   .map-bg { background: linear-gradient(135deg, #2a1a14 0%, #1a0d0d 100%); }
  .map-card[data-map="Split"]   .map-bg { background: linear-gradient(135deg, #1a1a2a 0%, #0d0d1a 100%); }
  .map-card[data-map="Summit"]  .map-bg { background: linear-gradient(135deg, #1a2a2a 0%, #0d1a1a 100%); }
  .map-card[data-map="Sunset"]  .map-bg { background: linear-gradient(135deg, #2a1a10 0%, #1a0d08 100%); }

  .map-bg {
    position: absolute; inset: 0;
    transition: opacity 0.3s;
  }

  /* Map icon (big letter) */
  .map-icon {
    position: absolute;
    bottom: -10px; right: -8px;
    font-size: 72px;
    font-weight: 700;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    letter-spacing: -2px;
    pointer-events: none;
    transition: color 0.3s;
  }

  .map-name {
    position: absolute;
    bottom: 10px; left: 12px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 2;
    transition: color 0.3s;
  }

  /* Crosshair corner decoration */
  .map-card::before, .map-card::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    z-index: 3;
    transition: opacity 0.2s;
    opacity: 0;
  }
  .map-card::before {
    top: 5px; left: 5px;
    border-top: 1px solid currentColor;
    border-left: 1px solid currentColor;
  }
  .map-card::after {
    bottom: 5px; right: 5px;
    border-bottom: 1px solid currentColor;
    border-right: 1px solid currentColor;
  }
  .map-card.next-ban { color: var(--ban); }
  .map-card.next-pick { color: var(--pick); }
  .map-card.next-ban::before,
  .map-card.next-ban::after,
  .map-card.next-pick::before,
  .map-card.next-pick::after { opacity: 1; }

  /* === BANNED === */
  .map-card.banned {
    cursor: default;
    border-color: rgba(255,70,85,0.4);
    box-shadow: 0 0 0 1px rgba(255,70,85,0.1) inset;
  }
  .map-card.banned .map-bg { opacity: 0.3; }
  .map-card.banned .map-name { color: var(--ban); opacity: 0.7; }
  .map-card.banned .ban-x {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }

  /* === PICKED === */
  .map-card.picked {
    cursor: default;
    border-color: var(--pick);
    box-shadow: 0 0 18px var(--pick-glow);
  }
  .map-card.picked .map-name { color: var(--pick); }
  .map-card.picked .pick-check { opacity: 1; transform: scale(1); }

  /* Ban X overlay */
  .ban-x {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.7) rotate(-20deg);
    transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 4;
  }
  .ban-x svg { width: 44px; height: 44px; }

  /* Pick check overlay */
  .pick-check {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.7);
    transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 4;
  }
  .pick-check svg { width: 40px; height: 40px; }

  /* === RESULTS PANEL === */
  .results-panel {
    margin-top: 36px;
    padding: 24px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: none;
  }
  .results-panel.visible { display: block; }

  .results-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .results-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .result-chip {
    padding: 6px 16px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .result-chip.ban  { color: var(--ban);  border-color: rgba(255,70,85,0.4);  background: var(--ban-dim); }
  .result-chip.pick { color: var(--pick); border-color: rgba(0,194,199,0.4);  background: var(--pick-dim); }

  .result-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.7;
    display: block;
    margin-top: 2px;
  }

  /* Final map highlight */
  .final-map-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    border: 1px solid var(--pick);
    background: var(--pick-dim);
    box-shadow: 0 0 20px var(--pick-glow);
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    margin-top: 16px;
  }
  .final-map-badge .badge-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--pick);
    text-transform: uppercase;
  }
  .final-map-badge .badge-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--pick);
  }

  /* Responsive */
  @media (max-width: 600px) {
    header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
    main { padding: 24px 16px 40px; }
    .maps-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  }

  /* Flash animation on select */
  @keyframes flash-ban {
    0% { background: rgba(255,70,85,0.4); }
    100% { background: transparent; }
  }
  @keyframes flash-pick {
    0% { background: rgba(0,194,199,0.4); }
    100% { background: transparent; }
  }
  .flash-ban  { animation: flash-ban  0.5s ease-out; }
  .flash-pick { animation: flash-pick 0.5s ease-out; }
</style>
</head>
<body>

<header>
  <div class="logo">VALO<span>RANT</span> — MAP DRAFT</div>
  <div class="presets">
    <button class="preset-btn active" onclick="setPreset('bo1')">BO1</button>
    <button class="preset-btn" onclick="setPreset('bo3')">BO3</button>
  </div>
  <button class="reset-btn" onclick="reset()">↺ RESET</button>
</header>

<main>
  <div class="sequence-wrapper">
    <div class="sequence-label">// SECUENCIA DE DRAFT</div>
    <div class="sequence" id="sequence"></div>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="status-indicator"></div>
    <div class="status-text" id="statusText">SELECCIONA UN MAPA</div>
    <div class="status-sub" id="statusSub"></div>
  </div>

  <div class="maps-grid" id="mapsGrid"></div>

  <div class="results-panel" id="resultsPanel">
    <div class="results-title">// RESULTADO DEL DRAFT</div>
    <div class="results-row" id="resultsRow"></div>
  </div>
</main>

<script>
  const MAPS = ['Ascent','Breeze','Haven','Lotus','Split','Summit','Sunset'];

  const PRESETS = {
    bo1: [
      {type:'ban',  label:'BAN 1'},
      {type:'ban',  label:'BAN 2'},
      {type:'ban',  label:'BAN 3'},
      {type:'ban',  label:'BAN 4'},
      {type:'ban',  label:'BAN 5'},
      {type:'ban',  label:'BAN 6'},
      {type:'pick', label:'MAPA'},
    ],
    bo3: [
      {type:'ban',  label:'BAN 1'},
      {type:'ban',  label:'BAN 2'},
      {type:'pick', label:'PICK 1'},
      {type:'pick', label:'PICK 2'},
      {type:'ban',  label:'BAN 3'},
      {type:'ban',  label:'BAN 4'},
      {type:'pick', label:'MAPA 3'},
    ],
  };

  let currentPreset = 'bo1';
  let sequence = [];
  let currentStep = 0;
  let selections = []; // {map, type}

  function setPreset(preset) {
    currentPreset = preset;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.textContent.trim().toLowerCase() === preset));
    reset();
  }

  function reset() {
    sequence = PRESETS[currentPreset].map(s => ({...s, map: null}));
    currentStep = 0;
    selections = [];
    renderSequence();
    renderMaps();
    updateStatus();
    document.getElementById('resultsPanel').classList.remove('visible');
  }

  function renderSequence() {
    const container = document.getElementById('sequence');
    container.innerHTML = '';
    sequence.forEach((step, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'seq-step';
      wrap.id = `seq-step-${i}`;

      const dot = document.createElement('div');
      dot.className = `seq-dot type-${step.type}`;
      if (i === currentStep && currentStep < sequence.length) dot.classList.add('is-active');
      if (step.map) dot.classList.add('done');
      dot.textContent = step.type === 'ban' ? 'BAN' : 'PCK';

      const name = document.createElement('div');
      name.className = 'seq-map-name';
      name.textContent = step.map ? step.map.substring(0, 6) : '';

      wrap.appendChild(dot);
      wrap.appendChild(name);
      container.appendChild(wrap);
    });
  }

  function renderMaps() {
    const grid = document.getElementById('mapsGrid');
    grid.innerHTML = '';
    const isDone = currentStep >= sequence.length;
    const currentType = !isDone ? sequence[currentStep].type : null;

    MAPS.forEach(map => {
      const sel = selections.find(s => s.map === map);
      const card = document.createElement('div');
      card.className = 'map-card';
      card.dataset.map = map;

      if (sel) {
        card.classList.add(sel.type === 'ban' ? 'banned' : 'picked');
      } else if (!isDone) {
        card.classList.add(`next-${currentType}`);
      }

      card.innerHTML = `
        <div class="map-bg"></div>
        <div class="map-icon">${map[0]}</div>
        <div class="map-name">${map}</div>
        <div class="ban-x">
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="8" y1="8" x2="36" y2="36" stroke="#FF4655" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="36" y1="8" x2="8" y2="36" stroke="#FF4655" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="pick-check">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polyline points="8,20 17,29 32,12" stroke="#00C2C7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      `;

      if (!sel && !isDone) {
        card.addEventListener('click', () => selectMap(map, card));
      }

      grid.appendChild(card);
    });
  }

  function selectMap(map, card) {
    if (currentStep >= sequence.length) return;

    const step = sequence[currentStep];
    step.map = map;
    selections.push({map, type: step.type});

    // Flash
    card.classList.add(step.type === 'ban' ? 'flash-ban' : 'flash-pick');
    setTimeout(() => card.classList.remove('flash-ban', 'flash-pick'), 500);

    currentStep++;
    renderSequence();
    renderMaps();
    updateStatus();

    if (currentStep >= sequence.length) {
      showResults();
    }
  }

  function updateStatus() {
    const bar = document.getElementById('statusBar');
    const text = document.getElementById('statusText');
    const sub = document.getElementById('statusSub');

    bar.className = 'status-bar';

    if (currentStep >= sequence.length) {
      bar.classList.add('status-done');
      text.textContent = 'DRAFT COMPLETADO';
      sub.textContent = 'Todos los mapas han sido procesados';
      return;
    }

    const step = sequence[currentStep];
    const stepNum = currentStep + 1;
    bar.classList.add(`status-${step.type}`);
    text.textContent = step.type === 'ban'
      ? `BANEANDO — ${step.label}`
      : `ELIGIENDO — ${step.label}`;
    sub.textContent = `PASO ${stepNum} / ${sequence.length} · Selecciona un mapa`;
  }

  function showResults() {
    const panel = document.getElementById('resultsPanel');
    const row = document.getElementById('resultsRow');
    panel.classList.add('visible');
    row.innerHTML = '';

    const bans  = selections.filter(s => s.type === 'ban');
    const picks = selections.filter(s => s.type === 'pick');

    bans.forEach((s, i) => {
      const chip = document.createElement('div');
      chip.className = 'result-chip ban';
      chip.innerHTML = `${s.map}<span class="result-label">BAN ${i+1}</span>`;
      row.appendChild(chip);
    });

    if (picks.length > 0) {
      const finalMap = picks[picks.length - 1];
      const badge = document.createElement('div');
      badge.className = 'final-map-badge';
      badge.style.display = 'flex';
      badge.innerHTML = `<span class="badge-label">MAPA FINAL</span><span class="badge-name">${finalMap.map}</span>`;
      panel.appendChild(badge);

      // Intermediate picks (Bo3)
      picks.slice(0, -1).forEach((s, i) => {
        const chip = document.createElement('div');
        chip.className = 'result-chip pick';
        chip.innerHTML = `${s.map}<span class="result-label">PICK ${i+1}</span>`;
        row.appendChild(chip);
      });
    }
  }

  // Init
  reset();
</script>
</body>
</html>
